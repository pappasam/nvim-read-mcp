name: release
on:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          version="${{ github.event.release.tag_name }}"
          name="nvim-context-mcp-${version}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/nvim-context-mcp" "$name/"
          cp README.md LICENSE "$name/"
          tar -czf "$name.tar.gz" "$name"
      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}"
          $name = "nvim-context-mcp-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $name
          Copy-Item "target/${{ matrix.target }}/release/nvim-context-mcp.exe" "$name/"
          Copy-Item README.md, LICENSE "$name/"
          Compress-Archive -Path "$name/*" -DestinationPath "$name.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nvim-context-mcp-${{ github.event.release.tag_name }}-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error
  release:
    name: Upload release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*
